<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App-Clima</title>
  </head>
  <body>
    <header>
      <h1>El Tiempo</h1>
    </header>

    <main>
      <section>
        <form action="/" id="form-weather">
          <input
            type="text"
            id="input-city"
            placeholder="Ej: Madrid"
            required
          />
          <button type="submit">Buscar Clima</button>
        </form>

        <div id="score-time"></div>
        
        <h3>Historial de Búsqueda</h3>
        <ul id="history-list"></ul>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
